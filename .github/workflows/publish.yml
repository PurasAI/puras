# Publish to PyPI on merge to main — auto-version model.
#
# This repo ships TWO independent wheels:
#
#   puras-runner  ->  worker/__init__.py            (root pyproject.toml)
#   puras         ->  worker/sdk/puras/__init__.py  (worker/sdk/pyproject.toml)
#
# Version resolution (per package, on every push to main):
#
#   1. Read __version__ from the package's __init__.py  ("source version")
#   2. Query PyPI for the latest published version       ("pypi latest")
#
#   If source > pypi latest  ->  developer manually bumped (minor or major).
#                                Publish the source version as-is.
#
#   If source <= pypi latest ->  version was NOT bumped.  Check whether
#                                relevant code files changed in this push.
#                                  Changed   -> auto-bump to pypi_latest + 1 minor, publish.
#                                  Unchanged -> skip (no release needed).
#
# This means:
#   - Major bumps are always manual: set __version__ = "2.0.0" in your PR.
#   - Minor/patch bumps happen automatically whenever code changes.
#   - A push that only touches docs, CI, or examples -> no publish.
#   - Two packages move independently; a runner change does not force an SDK publish.
#
# Auth: PyPI Trusted Publishing (OIDC) - no token stored in the repo.

name: publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: puras-runner
            dir: .
            version_file: worker/__init__.py
          - pkg: puras
            dir: worker/sdk
            version_file: worker/sdk/puras/__init__.py
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version and decide whether to publish
        id: resolve
        env:
          PKG: ${{ matrix.pkg }}
          VERSION_FILE: ${{ matrix.version_file }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # 1. Read source version from __init__.py
          SOURCE=$(python3 - "$VERSION_FILE" <<'PY'
          import re, sys
          src = open(sys.argv[1], encoding="utf-8").read()
          m = re.search(r"^__version__\s*=\s*[\"']([^\"']+)[\"']", src, re.M)
          if not m: sys.exit(f"no __version__ in {sys.argv[1]}")
          print(m.group(1))
          PY
          )
          echo "::notice::${PKG} source version: ${SOURCE}"

          # 2. Query PyPI for the latest published version
          PYPI_LATEST=$(python3 - "$PKG" <<'PY'
          import json, sys, urllib.request
          pkg = sys.argv[1]
          try:
              with urllib.request.urlopen(f"https://pypi.org/pypi/{pkg}/json", timeout=15) as r:
                  data = json.loads(r.read())
          except Exception:
              data = {}
          releases = list((data.get("releases") or {}).keys())
          parse = lambda v: [int(x) for x in v.split(".")]
          try:
              latest = max(releases, key=parse)
          except Exception:
              latest = "0.0.0"
          print(latest)
          PY
          )
          echo "::notice::${PKG} PyPI latest: ${PYPI_LATEST}"

          # 3. If source > pypi latest: developer explicitly bumped -- publish as-is
          IS_NEW=$(python3 - "$SOURCE" "$PYPI_LATEST" <<'PY'
          import sys
          parse = lambda v: [int(x) for x in v.split(".")]
          print("true" if parse(sys.argv[1]) > parse(sys.argv[2]) else "false")
          PY
          )

          if [ "$IS_NEW" = "true" ]; then
            echo "version=${SOURCE}" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${PKG} ${SOURCE} > PyPI ${PYPI_LATEST} -- publishing explicit version"
            exit 0
          fi

          # 4. Version already on PyPI -- check for relevant code changes in this push
          BEFORE="${BEFORE_SHA}"
          _ZEROS="0000000000000000000000000000000000000000"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$_ZEROS" ]; then
            CHANGED="first-push"
          elif [ "$PKG" = "puras" ]; then
            CHANGED=$(git diff --name-only "$BEFORE" "$HEAD_SHA" \
              -- 'worker/sdk/puras/' ':!worker/sdk/puras/__init__.py' 2>/dev/null || true)
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$HEAD_SHA" \
              -- 'worker/' ':!worker/sdk/' ':!worker/__init__.py' 2>/dev/null || true)
          fi

          if [ -z "$CHANGED" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${PKG} -- no relevant code changes in this push, skipping"
            exit 0
          fi

          # 5. Auto-bump: max(pypi_latest, source) + 1 minor (written inline, never committed)
          NEXT=$(python3 - "$PYPI_LATEST" "$SOURCE" <<'PY'
          import sys
          parse = lambda v: [int(x) for x in v.split(".")]
          pypi = parse(sys.argv[1])
          src  = parse(sys.argv[2])
          base = pypi if pypi > src else src
          print(f"{base[0]}.{base[1]+1}.0")
          PY
          )

          python3 - "$VERSION_FILE" "$NEXT" <<'PY'
          import re, sys
          path, ver = sys.argv[1], sys.argv[2]
          src = open(path, encoding="utf-8").read()
          src = re.sub(
              r"""(__version__\s*=\s*[\"'])[^\"']+([\"'])""",
              rf"\g<1>{ver}\g<2>", src, count=1
          )
          open(path, "w", encoding="utf-8").write(src)
          PY

          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "::notice::${PKG} auto-bumped ${SOURCE} -> ${NEXT} (code changed, version not bumped)"

      - name: Build sdist + wheel
        if: steps.resolve.outputs.should_publish == 'true'
        working-directory: ${{ matrix.dir }}
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist .

      - name: Publish to PyPI
        if: steps.resolve.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.dir }}/dist
          print-hash: true

# ---------------------------------------------------------------------------
# One-time PyPI setup (per project -- in the PyPI web UI):
#
#   PyPI -> project -> Settings -> Publishing -> "Add a pending publisher":
#     Owner: PurasAI  |  Repo: puras  |  Workflow: publish.yml  |  Env: (blank)
#
# Do this for both `puras` and `puras-runner`.
# ---------------------------------------------------------------------------

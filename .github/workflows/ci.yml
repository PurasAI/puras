name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the runner + the puras CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e .            # puras-runner (the offline runtime)
          pip install -e worker/sdk   # the puras CLI + SDK
          pip install pytest

      - name: Offline import path stays dependency-light
        # The crown-jewel guard: the local-run import graph must not pull the
        # hosted DB/storage/openai stack. (worker/tests/dry/*)
        run: pytest -q tests/dry

      - name: puras CLI is wired
        run: |
          puras --version
          puras run --local --help >/dev/null
          puras eval --local --help >/dev/null

title: Picky Copywriter
description: >
  Writes one marketing copy per brief for a client with a hidden, consistent
  style guide. Learns the rulebook over time from memory + eval feedback.

entrypoint: SKILL.md
text_model: claude/haiku-4-5
disable_bash: true

input_schema:
  type: object
  required: [product, fact, number, round_index, session_dir]
  properties:
    product:
      type: string
      description: The product to write copy for.
    fact:
      type: string
      description: A feature to highlight.
    number:
      type: string
      description: A relevant figure (price, size, count) you may use.
    round_index:
      type: integer
      description: Which brief this is (0-based).
    session_dir:
      type: string
      description: Pass-through — where memory and the authoritative score live.

output_schema:
  type: object
  properties:
    copy:
      type: text
      description: The marketing copy you submitted.
    score:
      type: number
      description: The grader score your submission received.

tools:
  - name: recall
    description: >
      Retrieve the lessons you've learned about this client's style guide so far.
      Call it first, before writing.
    entrypoint: tools/recall.py:run
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: Optional hint about what to recall.
    output_schema:
      type: object
      properties:
        lessons:
          type: array
          items: { type: string }
          description: Lessons learned in earlier briefs.

  - name: remember
    description: >
      Save one short, durable lesson about the client's style so future briefs
      score higher. Call once per rule you discover from feedback.
    entrypoint: tools/remember.py:run
    input_schema:
      type: object
      required: [lesson]
      properties:
        lesson:
          type: string
          description: A concise rule to remember (e.g. "must end with a question").
    output_schema:
      type: object
      properties:
        saved:
          type: boolean
        count:
          type: integer
          description: How many lessons are now stored.

  - name: submit_copy
    description: >
      Submit your finished copy. Returns a score in [0,1] and which of the
      client's rules it broke. Only your FIRST submission this brief is scored.
    entrypoint: tools/submit_copy.py:run
    input_schema:
      type: object
      required: [copy]
      properties:
        copy:
          type: string
          description: The marketing copy to submit.
    output_schema:
      type: object
      properties:
        score:
          type: number
        broken_rules:
          type: array
          items: { type: string }
        perfect:
          type: boolean

examples:
  - title: One brief
    inputs:
      product: the Nimbus 7 backpack
      fact: a rain-proof zip
      number: 30L
      round_index: 0
      session_dir: /tmp/picky-demo
